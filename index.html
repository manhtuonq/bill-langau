  .sidebar-footer {

    overflow-y: auto;
    display: flex; flex-direction: column;

  .topbar {
    background: #ffffff;
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    height: 62px;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
    position: sticky; top: 0; z-index: 50;
    box-shadow: 0 2px 12px rgba(30,95,168,0.07);
  }

  .topbar-title { font-size: 18px; font-weight: 700; color: var(--white); }
  .topbar-sub { font-size: 11px; color: var(--muted); font-weight: 500; }

  .topbar-right { display: flex; align-items: center; gap: 16px; }

  .topbar-badge {
    background: var(--blue-accent);
    color: var(--white);
    padding: 5px 14px; border-radius: 20px;
    font-size: 11px; font-weight: 700;
    display: flex; align-items: center; gap: 6px;
  }

  .hamburger {
    display: none; background: none; border: none;
    color: var(--white); font-size: 20px; cursor: pointer;
  }

  /* CONTENT */

    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
    margin-bottom: 30px;
  }

  .stat-card {
    background: #ffffff;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 24px;
    display: flex; align-items: center; gap: 18px;
    transition: transform 0.2s;
    box-shadow: 0 2px 12px rgba(30,95,168,0.07);

  .stat-icon {

    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;

  .stat-value { font-size: 22px; font-weight: 800; color: var(--white); margin-top: 4px; }

    font-size: 11px; font-weight: 600; color: var(--muted);

    gap: 16px;

    border: 1px solid var(--border);

    overflow: hidden;

    display: none; align-items: center; justify-content: center;
    padding: 20px;

    background: #ffffff;
    border: 1px solid var(--border);
    border-radius: 20px;
    width: 100%; max-width: 560px;
    max-height: 90vh; overflow-y: auto;
    animation: slideUp 0.3s ease;
    box-shadow: 0 20px 60px rgba(30,95,168,0.2);

  @keyframes slideUp {
    from { opacity:0; transform: translateY(30px); }
    to   { opacity:1; transform: translateY(0); }
  }

  .modal-header {
    background: var(--blue-accent);
    padding: 18px 22px;
    border-radius: 20px 20px 0 0;

  .modal-row-value { font-size: 12px; color: var(--white); font-weight: 600; text-align: right; }

    .stats-row { grid-template-columns: repeat(2, 1fr); }

    arrive: "2026-04-30",
    depart: "2026-05-01",
    tour: "Phạm Đoàn La Ngâu",
    total: 600000,
    deposit: 300000,
    note: "Bên em hiện tại chốt 4 người chắc chắn, nên em đặt trước 2 lều 2 người. Có 1 bạn nữa đang xác nhận, nếu đi thêm thì em báo để đặt thêm lều sau nhé a",
    extra: [
      { label: "Lều", val: "2 lều (mỗi lều 2 người)" },
      { label: "Vé vào cổng", val: "Chưa có" },
      { label: "Phụ phí qua đêm", val: "Chưa có" }
    ],
    imgIndex: 6
  }
];

// Actual uploaded images mapped by index
const imgPaths = [
  "/mnt/user-data/uploads/1776225551623_image.png",
  "/mnt/user-data/uploads/1776225556513_image.png",
  "/mnt/user-data/uploads/1776225561144_image.png",
  "/mnt/user-data/uploads/1776225564971_image.png",
  "/mnt/user-data/uploads/1776225574423_image.png",
  "/mnt/user-data/uploads/1776225579466_image.png",
  "/mnt/user-data/uploads/1776225584648_image.png"
];

function fmt(n) {
  return n.toLocaleString('vi-VN');
}

function computeStats() {
  let total = 0, deposit = 0, people = 0;
  bills.forEach(b => { total += b.total; deposit += b.deposit; people += b.people; });
  document.getElementById('statTotal').innerHTML = fmt(total) + ' <span>VNĐ</span>';
  document.getElementById('statDeposit').innerHTML = fmt(deposit) + ' <span>VNĐ</span>';
  document.getElementById('statPeople').innerHTML = people + ' <span>người</span>';
}

function renderBills() {
  const grid = document.getElementById('billsGrid');
  grid.innerHTML = '';
  bills.forEach((b, i) => {
    const card = document.createElement('div');
    card.className = 'bill-card';
    card.innerHTML = `
      <div class="bill-card-header">
        <span class="bill-id"><i class="fa-solid fa-hashtag"></i> ${b.id}</span>
        <span class="bill-date"><i class="fa-regular fa-clock"></i> ${b.date}</span>
      </div>
      <div class="bill-card-body">
        <div class="bill-name"><i class="fa-solid fa-user" style="color:var(--cyan);font-size:11px;margin-right:6px"></i>${b.name}</div>
        <div class="bill-meta">
          <div class="bill-meta-row"><i class="fa-solid fa-phone"></i> ${b.phone}</div>
          <div class="bill-meta-row"><i class="fa-solid fa-users"></i> ${b.people} người</div>
          <div class="bill-meta-row"><i class="fa-regular fa-calendar"></i> Đến: ${b.arrive}${b.depart ? ' — Đi: ' + b.depart : ''}</div>
          <div class="bill-meta-row"><i class="fa-solid fa-location-dot"></i> ${b.tour}</div>
        </div>
        <div class="bill-amounts">
          <div class="amount-item">
            <span class="amount-label">Tổng tiền</span>
            <span class="amount-val total">${fmt(b.total)}</span>
          </div>
          <div class="amount-item" style="text-align:right">
            <span class="amount-label">Tiền cọc</span>
            <span class="amount-val deposit">${fmt(b.deposit)}</span>
          </div>
        </div>
        <button class="bill-detail-btn" onclick="openModal(${i})">
          <i class="fa-solid fa-eye"></i> Xem Chi Tiết
        </button>
      </div>
    `;
    grid.appendChild(card);
  });
}

function openModal(i) {
  const b = bills[i];
  document.getElementById('modalId').textContent = 'Mã bill: ' + b.id;
  document.getElementById('modalDate').innerHTML = '<i class="fa-regular fa-clock"></i> ' + b.date;

  let extras = b.extra.map(e => `
    <div class="modal-row">
      <span class="modal-row-label">${e.label}</span>
      <span class="modal-row-value">${e.val}</span>
    </div>
  `).join('');

  let noteHtml = b.note ? `
    <div class="modal-row">
      <span class="modal-row-label"><i class="fa-solid fa-note-sticky" style="color:var(--cyan)"></i> Ghi chú</span>
      <span class="modal-row-value" style="font-style:italic;color:var(--muted);font-size:11px;max-width:60%">${b.note}</span>
    </div>
  ` : '';

  document.getElementById('modalBody').innerHTML = `
    <div class="modal-row">
      <span class="modal-row-label">Họ và tên</span>
      <span class="modal-row-value">${b.name}</span>
    </div>
    <div class="modal-row">
      <span class="modal-row-label">Số điện thoại</span>
      <span class="modal-row-value">${b.phone}</span>
    </div>
    <div class="modal-row">
      <span class="modal-row-label">Số lượng người đi</span>
      <span class="modal-row-value">${b.people} người</span>
    </div>
    <div class="modal-row">
      <span class="modal-row-label">Ngày đến</span>
      <span class="modal-row-value">${b.arrive}</span>
    </div>
    ${b.depart ? `<div class="modal-row"><span class="modal-row-label">Ngày đi</span><span class="modal-row-value">${b.depart}</span></div>` : ''}
    <div class="modal-row">
      <span class="modal-row-label">Điểm đến / Tour</span>
      <span class="modal-row-value">${b.tour}</span>
    </div>
    <div class="modal-row">
      <span class="modal-row-label">Tổng tiền (VNĐ)</span>
      <span class="modal-row-value highlight">${fmt(b.total)}</span>
    </div>
    <div class="modal-row">
      <span class="modal-row-label">Tiền cọc (VNĐ)</span>
      <span class="modal-row-value gold">${fmt(b.deposit)}</span>
    </div>
    ${extras}
    ${noteHtml}
    <div class="modal-img-section">
      <div class="modal-img-label"><i class="fa-solid fa-image"></i> Ảnh Cọc Tiền</div>
      <div class="modal-img-wrap">
        <img src="${imgPaths[b.imgIndex]}" alt="Ảnh cọc tiền ${b.name}" onerror="this.style.display='none';this.parentElement.innerHTML='<div style=padding:40px;color:var(--muted);font-size:12px;text-align:center><i class=fa-solid fa-image style=font-size:32px;display:block;margin-bottom:10px></i>Ảnh bill chuyển khoản</div>'">
      </div>
    </div>
  `;

  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}

function setPage(page) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  event.currentTarget.classList.add('active');
  document.getElementById('pageTitle').textContent = page === 'overview' ? 'Tổng Quan' : 'Danh Sách Bill';
}

computeStats();
renderBills();
</script>
</body>
</html>
